name: generate the ASCII artwork script
on: push
jobs:
    script:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout
              uses: actions/checkout@v4
            
            - name: list the repo
              run: ls -ltra

            - name: Execute the script
              run: |
                    chmod +x workflows/shell_script.sh
                   .workflows/shell_script.sh